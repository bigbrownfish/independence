<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Независимость стран Латинской Америки</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #e0f7fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; touch-action: none; }
        #map-container { width: 100vw; height: 100vh; display: block; }
        
        .country { stroke: #2c3e50; stroke-width: 0.5px; transition: fill 0.3s, opacity 0.2s; cursor: pointer; }
        .country:hover { opacity: 0.7; }
        
        .island-marker { cursor: pointer; transition: opacity 0.2s; }
        .island-marker circle { stroke: #2c3e50; stroke-width: 0.5px; transition: fill 0.3s; }
        .island-marker:hover { opacity: 0.7; }
        
        .map-label { 
            font-size: 8px; 
            font-weight: 600; 
            fill: #111; 
            text-anchor: middle; 
            pointer-events: none; 
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8), -1px -1px 2px rgba(255,255,255,0.8), 1px -1px 2px rgba(255,255,255,0.8), -1px 1px 2px rgba(255,255,255,0.8);
            transition: opacity 0.3s;
        }
        
        #tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid #bdc3c7;
            padding: 12px 15px;
            border-radius: 6px;
            pointer-events: none;
            opacity: 0;
            font-size: 14px;
            box-shadow: 0px 6px 15px rgba(0,0,0,0.15);
            max-width: 350px;
            z-index: 10;
        }
        .tooltip-title { font-weight: bold; font-size: 16px; margin-bottom: 8px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 4px;}
        .tooltip-row { margin-bottom: 5px; line-height: 1.4; color: #34495e; }
        
        .panel {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 5;
            font-size: 13px;
        }
        
        #controls { top: 15px; left: 15px; width: 220px; }
        #controls h2 { margin: 0 0 12px 0; font-size: 15px; color: #2c3e50; border-bottom: 1px solid #ecf0f1; padding-bottom: 5px; }
        .control-group { margin-bottom: 15px; }
        .toggle-label { display: flex; align-items: center; margin-bottom: 6px; font-size: 13px; cursor: pointer; color: #34495e; }
        .toggle-label input { margin-right: 8px; cursor: pointer; }
        
        .back-link { display: inline-block; margin-bottom: 15px; text-decoration: none; color: #2980b9; font-weight: bold; }
        .back-link:hover { color: #3498db; }

        #legend { bottom: 20px; right: 20px; cursor: grab; user-select: none; width: 200px; }
        #legend:active { cursor: grabbing; }
        #legend h3 { margin: 0 0 12px 0; font-size: 14px; text-align: center; pointer-events: none; color: #2c3e50; }
        .legend-item { display: flex; align-items: center; margin-bottom: 8px; pointer-events: none; color: #34495e; }
        .legend-color { width: 16px; height: 16px; margin-right: 10px; border: 1px solid #95a5a6; border-radius: 3px; flex-shrink: 0; }
        
        /* Специфичные паттерны легенды */
        .legend-stripe { background: repeating-linear-gradient(45deg, #ccc, #ccc 4px, #7f8c8d 4px, #7f8c8d 8px); }
        .legend-disputed { background: repeating-linear-gradient(45deg, #e57373, #e57373 4px, #64b5f6 4px, #64b5f6 8px); }
    </style>
</head>
<body>

<div id="controls" class="panel">
    <a href="index.html" class="back-link">← На главное меню</a>
    
    <div class="control-group">
        <h2>Слои карты</h2>
        <label class="toggle-label"><input type="radio" name="color-mode" value="metro" checked> По метрополиям</label>
        <label class="toggle-label"><input type="radio" name="color-mode" value="period"> По периодам независимости</label>
    </div>

    <div class="control-group" style="margin-bottom: 0;">
        <h2>Отображение стран</h2>
        <label class="toggle-label"><input type="checkbox" id="toggle-independent" checked> Независимые государства</label>
        <label class="toggle-label"><input type="checkbox" id="toggle-dependent" checked> Зависимые территории</label>
    </div>
</div>

<div id="legend" class="panel">
    <h3>Условные обозначения</h3>
    <div id="legend-items"></div>
</div>

<div id="tooltip"></div>
<svg id="map-container">
    <defs></defs>
</svg>

<script>
    // --- ПЕРЕТАСКИВАНИЕ ЛЕГЕНДЫ ---
    const legend = document.getElementById("legend");
    let isDragging = false, offsetX, offsetY;

    legend.addEventListener("mousedown", (e) => {
        isDragging = true;
        const rect = legend.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
    });
    document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        legend.style.right = 'auto'; legend.style.bottom = 'auto';
        legend.style.left = `${e.clientX - offsetX}px`;
        legend.style.top = `${e.clientY - offsetY}px`;
    });
    document.addEventListener("mouseup", () => isDragging = false);

    // --- КАРТОГРАФИЧЕСКАЯ ОСНОВА ---
    const svg = d3.select("#map-container");
    const width = window.innerWidth;
    const height = window.innerHeight;

    const projection = d3.geoMercator()
        .center([-75, -5])
        .scale(420)
        .translate([width / 2, height / 2]);

    const path = d3.geoPath().projection(projection);
    const mapGroup = svg.append("g");

    // Глобальная переменная для хранения текущего уровня зума
    let currentZoom = 1;

    const zoom = d3.zoom()
        .scaleExtent([0.5, 15])
        .on("zoom", (event) => {
            currentZoom = event.transform.k;
            mapGroup.attr("transform", event.transform);
            
            // Семантическое масштабирование: границы стран
            mapGroup.selectAll(".country").style("stroke-width", (0.5 / currentZoom) + "px");
            mapGroup.selectAll(".island-marker circle")
                .attr("r", 5 / currentZoom)
                .style("stroke-width", (0.5 / currentZoom) + "px");
                
            // Семантическое масштабирование: подписи
            mapGroup.selectAll(".map-label")
                .style("font-size", (8 / currentZoom) + "px")
                .text(d => getDynamicLabel(d));
                
            mapGroup.selectAll(".island-marker text")
                .attr("y", -8 / currentZoom);
        });
    svg.call(zoom);

    svg.on("click", () => d3.select("#tooltip").transition().duration(200).style("opacity", 0));

    // --- ДАННЫЕ И ПАЛИТРЫ ---
    const powerColors = {
        "Испания": "#ffd54f", "Португалия": "#81c784", "Великобритания": "#e57373",
        "Франция": "#64b5f6", "Нидерланды": "#ffb74d", "США": "#ba68c8", "Дания": "#a1887f",
        "Аргентина": "#64b5f6" // Для спорных территорий
    };

    const periodColors = {
        "До 1810 г.": "#c6dbef",
        "1811 – 1830 гг.": "#6baed6",
        "1831 – 1900 гг.": "#2171b5",
        "XX век": "#08306b",
        "Зависимые": "#d9d9d9",
        "Спорные": "#ffb3ba"
    };

    const countryData = {
        "MEX": { name: "Мексика", capital: "Мехико", metro: "Испания (до 1821)", year: 1821, status: "independent" },
        "GTM": { name: "Гватемала", capital: "Гватемала", metro: "Испания (до 1821)", year: 1821, status: "independent" },
        "BLZ": { name: "Белиз", capital: "Бельмопан", metro: "Испания (до 1798), Великобритания (до 1981)", year: 1981, status: "independent" },
        "SLV": { name: "Сальвадор", capital: "Сан-Сальвадор", metro: "Испания (до 1821)", year: 1821, status: "independent" },
        "HND": { name: "Гондурас", capital: "Тегусигальпа", metro: "Испания (до 1821)", year: 1821, status: "independent" },
        "NIC": { name: "Никарагуа", capital: "Манагуа", metro: "Испания (до 1821)", year: 1821, status: "independent" },
        "CRI": { name: "Коста-Рика", capital: "Сан-Хосе", metro: "Испания (до 1821)", year: 1821, status: "independent" },
        "PAN": { name: "Панама", capital: "Панама", metro: "Испания (до 1821), Колумбия (до 1903)", year: 1903, status: "independent" },
        "VEN": { name: "Венесуэла", capital: "Каракас", metro: "Испания (до 1811)", year: 1811, status: "independent" },
        "COL": { name: "Колумбия", capital: "Богота", metro: "Испания (до 1819)", year: 1819, status: "independent" },
        "ECU": { name: "Эквадор", capital: "Кито", metro: "Испания (до 1822)", year: 1822, status: "independent" },
        "PER": { name: "Перу", capital: "Лима", metro: "Испания (до 1824)", year: 1824, status: "independent" },
        "BOL": { name: "Боливия", capital: "Сукре", metro: "Испания (до 1825)", year: 1825, status: "independent" },
        "CHL": { name: "Чили", capital: "Сантьяго", metro: "Испания (до 1818)", year: 1818, status: "independent" },
        "GUY": { name: "Гайана", capital: "Джорджтаун", metro: "Нидерланды (до 1814), Великобритания (до 1966)", year: 1966, status: "independent" },
        "SUR": { name: "Суринам", capital: "Парамарибо", metro: "Великобритания (до 1814), Нидерланды (до 1975)", year: 1975, status: "independent" },
        "BRA": { name: "Бразилия", capital: "Бразилиа", metro: "Португалия (до 1822)", year: 1822, status: "independent" },
        "PRY": { name: "Парагвай", capital: "Асунсьон", metro: "Испания (до 1811)", year: 1811, status: "independent" },
        "URY": { name: "Уругвай", capital: "Монтевидео", metro: "Испания (до 1814), Португалия (до 1824), Бразилия (до 1828)", year: 1828, status: "independent" },
        "ARG": { name: "Аргентина", capital: "Буэнос-Айрес", metro: "Испания (до 1816)", year: 1816, status: "independent" },
        "CUB": { name: "Куба", capital: "Гавана", metro: "Испания (до 1898), США (до 1902)", year: 1902, status: "independent" },
        "JAM": { name: "Ямайка", capital: "Кингстон", metro: "Испания (до 1655), Великобритания (до 1962)", year: 1962, status: "independent" },
        "BHS": { name: "Багамы", capital: "Нассау", metro: "Испания (до 1783), Великобритания (до 1973)", year: 1973, status: "independent" },
        "HTI": { name: "Гаити", capital: "Порт-о-Пренс", metro: "Испания (до 1697), Франция (до 1804)", year: 1804, status: "independent" },
        "DOM": { name: "Доминиканская Республика", capital: "Санто-Доминго", metro: "Испания (до 1821), Гаити (до 1844), Испания (до 1865)", year: 1865, status: "independent" },
        "KNA": { name: "Сент-Китс и Невис", capital: "Бастер", metro: "Франция (до 1783), Великобритания (до 1983)", year: 1983, status: "independent" },
        "ATG": { name: "Антигуа и Барбуда", capital: "Сент-Джонс", metro: "Франция (до 1666), Великобритания (до 1981)", year: 1981, status: "independent" },
        "DMA": { name: "Доминика", capital: "Розо", metro: "Франция (до 1763), Великобритания (до 1978)", year: 1978, status: "independent" },
        "LCA": { name: "Сент-Люсия", capital: "Кастри", metro: "Франция (до 1814), Великобритания (до 1979)", year: 1979, status: "independent" },
        "BRB": { name: "Барбадос", capital: "Бриджтаун", metro: "Великобритания (до 1966)", year: 1966, status: "independent" },
        "VCT": { name: "Сент-Винсент и Гренадины", capital: "Кингстаун", metro: "Франция (до 1783), Великобритания (до 1979)", year: 1979, status: "independent" },
        "GRD": { name: "Гренада", capital: "Сент-Джорджес", metro: "Франция (до 1763), Великобритания (до 1974)", year: 1974, status: "independent" },
        "TTO": { name: "Тринидад и Тобаго", capital: "Порт-оф-Спейн", metro: "Испания (до 1797), Великобритания (до 1962)", year: 1962, status: "independent" },
        
        "GUF": { name: "Гвиана (Фр.)", capital: "Кайенна", metro: "Португалия (до 1817), Франция (с 1817 по н.в.)", status: "dependent" },
        "PRI": { name: "Пуэрто-Рико", capital: "Сан-Хуан", metro: "Испания (до 1898), США (с 1898 по н.в.)", status: "dependent" },
        "FLK": { name: "Фолклендские (Мальвинские) острова", capital: "Стэнли", metro: "Великобритания (оспаривается Аргентиной)", status: "disputed" },
        "CYM": { name: "Острова Кайман", capital: "Джорджтаун", metro: "Испания (до 1670), Великобритания (с 1670 по н.в.)", status: "dependent" },
        "TCA": { name: "Теркс и Кайкос", capital: "Коберн-Таун", metro: "Франция, Испания, Великобритания (с 1783 по н.в.)", status: "dependent" },
        "VIR": { name: "Виргинские Острова (США)", capital: "Шарлотта-Амалия", metro: "Дания (до 1917), США (с 1917 по н.в.)", status: "dependent" },
        "VGB": { name: "Виргинские Острова (Брит.)", capital: "Роуд-Таун", metro: "Испания, Нидерланды, Великобритания (с 1672)", status: "dependent" },
        "AIA": { name: "Ангилья", capital: "Валли", metro: "Великобритания (с 1650 по н.в.)", status: "dependent" },
        "MSR": { name: "Монтсеррат", capital: "Плимут", metro: "Франция (до 1783), Великобритания (с 1783 по н.в.)", status: "dependent" },
        "GLP": { name: "Гваделупа", capital: "Бас-Тер", metro: "Великобритания (до 1816), Франция (с 1816 по н.в.)", status: "dependent" },
        "MTQ": { name: "Мартиника", capital: "Фор-де-Франс", metro: "Великобритания (до 1814), Франция (с 1814 по н.в.)", status: "dependent" },
        "BES": { name: "Бонэйр", capital: "Кралендейк", metro: "Испания, Великобритания, Нидерланды (с 1814)", status: "dependent" },
        "CUW": { name: "Кюрасао", capital: "Виллемстад", metro: "Испания, Великобритания, Нидерланды (с 1815)", status: "dependent" },
        "ABW": { name: "Аруба", capital: "Ораньестад", metro: "Испания, Великобритания, Нидерланды (с 1816)", status: "dependent" }
    };

    const islandNations = [
        { id: "KNA", coords: [-62.782998, 17.357822] }, { id: "ATG", coords: [-61.796428, 17.060816] },
        { id: "DMA", coords: [-61.370976, 15.414999] }, { id: "LCA", coords: [-60.978893, 13.909444] },
        { id: "BRB", coords: [-59.543198, 13.193887] }, { id: "VCT", coords: [-61.224816, 13.252818] },
        { id: "GRD", coords: [-61.679, 12.1165] }, { id: "TTO", coords: [-61.222503, 10.691803] },
        { id: "CYM", coords: [-80.566956, 19.3133] }, { id: "TCA", coords: [-71.797928, 21.694025] },
        { id: "VIR", coords: [-64.896335, 18.335765] }, { id: "VGB", coords: [-64.639968, 18.420695] },
        { id: "AIA", coords: [-63.068615, 18.220554] }, { id: "MSR", coords: [-62.187366, 16.742498] },
        { id: "GLP", coords: [-61.551, 16.265] }, { id: "MTQ", coords: [-61.024174, 14.641528] },
        { id: "BES", coords: [-68.2655, 12.1444] }, { id: "CUW", coords: [-68.99, 12.1696] },
        { id: "ABW", coords: [-69.9683, 12.5211] }
    ];

    // --- ЛОГИКА ОПРЕДЕЛЕНИЯ ЦВЕТА ---
    function getPeriodCategory(data) {
        if (data.status === 'disputed') return "Спорные";
        if (data.status === 'dependent') return "Зависимые";
        if (data.year <= 1810) return "До 1810 г.";
        if (data.year <= 1830) return "1811 – 1830 гг.";
        if (data.year <= 1900) return "1831 – 1900 гг.";
        return "XX век";
    }

    function getFillStyle(geoId, mode) {
        const data = countryData[geoId];
        if (!data) return "#f0f0f0";

        if (mode === 'period') {
            if (data.status === 'disputed') return "url(#pattern-disputed-period)";
            return periodColors[getPeriodCategory(data)];
        }

        // Режим метрополий
        if (data.status === 'disputed') return "url(#pattern-disputed)";
        
        const powers = Object.keys(powerColors).filter(p => data.metro.includes(p));
        if (powers.length === 0) return "#f0f0f0";
        if (powers.length === 1) return powerColors[powers[0]];
        
        const patternId = `pattern-${powers.join('-')}`;
        createPattern(patternId, powers.map(p => powerColors[p]));
        return `url(#${patternId})`;
    }

    // Создание SVG паттернов для штриховки
    function createPattern(id, colors) {
        const defs = svg.select("defs");
        if (defs.select(`#${id}`).empty()) {
            const pattern = defs.append("pattern")
                .attr("id", id).attr("width", 10).attr("height", 10)
                .attr("patternUnits", "userSpaceOnUse").attr("patternTransform", "rotate(45)");
            
            const stripeWidth = 10 / colors.length;
            colors.forEach((color, i) => {
                pattern.append("rect").attr("x", i * stripeWidth).attr("width", stripeWidth).attr("height", 10).attr("fill", color);
            });
        }
    }
    
    // Спец-штриховки для Фолклендов
    createPattern("pattern-disputed", [powerColors["Великобритания"], powerColors["Аргентина"]]);
    createPattern("pattern-disputed-period", ["#ffb3ba", "#ffdfba"]);

    // --- ЛОГИКА ОТОБРАЖЕНИЯ ПОДПИСЕЙ ---
    function getDynamicLabel(d) {
        const geoId = d.id || d.properties?.ADM0_A3 || d.properties?.GU_A3;
        const data = countryData[geoId];
        if (!data || data.status !== 'independent') return "";
        
        // Семантическое масштабирование: при зуме > 2.5 показываем название и год
        if (currentZoom > 2.5) {
            return `${data.name} (${data.year})`;
        }
        // Иначе только год
        return data.year;
    }

    // --- РЕНДЕР И ОБНОВЛЕНИЕ КАРТЫ ---
    function renderLegend(mode) {
        const container = d3.select("#legend-items");
        container.html(""); // Очистка
        
        if (mode === 'metro') {
            Object.keys(powerColors).filter(p => p !== "Аргентина").forEach(power => {
                const item = container.append("div").attr("class", "legend-item");
                item.append("div").attr("class", "legend-color").style("background-color", powerColors[power]);
                item.append("span").text(power);
            });
            const stripeItem = container.append("div").attr("class", "legend-item").style("margin-top", "10px");
            stripeItem.append("div").attr("class", "legend-color legend-stripe");
            stripeItem.append("span").text("Смена метрополий");
            
            const dispItem = container.append("div").attr("class", "legend-item");
            dispItem.append("div").attr("class", "legend-color legend-disputed");
            dispItem.append("span").text("Спорные территории");
        } else {
            Object.keys(periodColors).forEach(period => {
                const item = container.append("div").attr("class", "legend-item");
                if (period === "Спорные") {
                    item.append("div").attr("class", "legend-color").style("background", "repeating-linear-gradient(45deg, #ffb3ba, #ffb3ba 4px, #ffdfba 4px, #ffdfba 8px)");
                } else {
                    item.append("div").attr("class", "legend-color").style("background-color", periodColors[period]);
                }
                item.append("span").text(period);
            });
        }
    }

    function updateMap() {
        const mode = d3.select('input[name="color-mode"]:checked').node().value;
        const showIndep = d3.select("#toggle-independent").property("checked");
        const showDep = d3.select("#toggle-dependent").property("checked");

        renderLegend(mode);

        const isVisible = (geoId) => {
            const data = countryData[geoId];
            if (!data) return false;
            if (data.status === "independent" && !showIndep) return false;
            if ((data.status === "dependent" || data.status === "disputed") && !showDep) return false;
            return true;
        };

        mapGroup.selectAll(".country")
            .attr("fill", d => getFillStyle(d.properties.ADM0_A3 || d.properties.GU_A3, mode))
            .style("display", d => {
                const geoId = d.properties.ADM0_A3 || d.properties.GU_A3;
                return (!countryData[geoId] || isVisible(geoId)) ? "block" : "none";
            });

        mapGroup.selectAll(".island-marker circle")
            .attr("fill", d => getFillStyle(d.id, mode));
            
        mapGroup.selectAll(".island-marker")
            .style("display", d => isVisible(d.id) ? "block" : "none");
            
        mapGroup.selectAll(".map-label")
            .style("display", d => {
                const geoId = d.id || d.properties?.ADM0_A3 || d.properties?.GU_A3;
                return isVisible(geoId) ? "block" : "none";
            })
            .text(d => getDynamicLabel(d));
    }

    // Инициализация карты
    d3.json("ne_110m_admin_0_countries.geojson").then(world => {
        // Отрисовка полигонов
        mapGroup.selectAll(".country")
            .data(world.features)
            .enter().append("path")
            .attr("class", "country")
            .attr("d", path)
            .on("click", function(event, d) {
                event.stopPropagation();
                const geoId = d.properties.ADM0_A3 || d.properties.GU_A3;
                if(countryData[geoId]) showTooltip(event, countryData[geoId]);
            });

        // Подписи (текст)
        mapGroup.selectAll(".map-label.main")
            .data(world.features)
            .enter().append("text")
            .attr("class", "map-label main")
            .attr("transform", function(d) {
                const centroid = path.centroid(d);
                return (!isNaN(centroid[0]) && !isNaN(centroid[1])) ? `translate(${centroid[0]}, ${centroid[1]})` : "translate(-1000,-1000)";
            });

        // Острова
        const islands = mapGroup.selectAll(".island-group")
            .data(islandNations)
            .enter().append("g")
            .attr("class", "island-marker")
            .attr("transform", d => `translate(${projection(d.coords)[0]}, ${projection(d.coords)[1]})`)
            .on("click", function(event, d) {
                event.stopPropagation();
                if(countryData[d.id]) showTooltip(event, countryData[d.id]);
            });

        islands.append("circle").attr("r", 5);
        islands.append("text").attr("class", "map-label").attr("y", -8);

        // Слушатели событий интерфейса
        d3.selectAll('input[name="color-mode"]').on("change", updateMap);
        d3.select("#toggle-independent").on("change", updateMap);
        d3.select("#toggle-dependent").on("change", updateMap);

        updateMap();
    });

    function showTooltip(event, data) {
        let html = `
            <div class="tooltip-title">${data.name}</div>
            <div class="tooltip-row"><b>${data.status === 'dependent' || data.status === 'disputed' ? 'Административный центр' : 'Столица'}:</b> ${data.capital}</div>
            <div class="tooltip-row"><b>Метрополии:</b><br>${data.metro}</div>
        `;
        
        if (data.status === 'independent') {
            html += `<div class="tooltip-row" style="margin-top: 5px;"><b>Год независимости:</b> ${data.year}</div>`;
        }
        
        let statusStr = "Независимое государство";
        if (data.status === 'dependent') statusStr = "Зависимая территория";
        if (data.status === 'disputed') statusStr = "Спорная территория";
        
        html += `<div class="tooltip-row" style="margin-top: 5px;"><b>Статус:</b> ${statusStr}</div>`;

        d3.select("#tooltip").html(html)
            .style("left", (event.pageX + 15) + "px")
            .style("top", (event.pageY - 28) + "px")
            .transition().duration(200).style("opacity", 1);
    }
</script>
</body>
</html>
